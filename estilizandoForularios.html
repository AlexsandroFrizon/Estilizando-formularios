<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>Estilizando Formulários</title>
		<link rel="stylesheet" type="text/css" href="css_externo.css">
	</head>
	<body>
		<h2>Estilizando Formulários</h2>
		<form>
			<fieldset>
				<legend>Detalhes de contato</legend>

				<div>
					<label for="nome">Nome: </label>
					<input type="text" name="nome" id="nome">
				</div>
				<div>
					<label for="email">E-mail:: </label>
					<input type="text" name="email" id="email">
				</div>
				<div>
					<label for="url">Url: </label>
					<input type="text" name="url" id="url">
				</div>
			</fieldset>

			<fieldset>
				<legend>Comentários</legend>
				<div>
					<label>
						<textarea name="text" id="text"></textarea>
					</label>
				</div>
			</fieldset>

			<fieldset>
				<legend>Lembra de mim</legend>
				<div>
					<label>
						<input class="radio" type="radio" name="lembrar" id="sim"> Sim
					</label>
				</div>

				<div>
					<label>
						<input class="radio" type="radio" name="lembrar" id="sim"> Não
					</label>
				</div>

			</fieldset>
		</form>
	</body>
</html>
